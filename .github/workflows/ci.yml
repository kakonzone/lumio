name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze (non-blocking)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos || echo "Flutter analyze had errors but continuing..."

      - name: flutter test
        run: flutter test --reporter expanded

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: |
            build/test_results/
          if-no-files-found: ignore
