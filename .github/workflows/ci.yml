name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Block raw print/agentDebugLog in lib/
        run: |
          if grep -rnE "(^|[^A-Za-z])print\(|agentDebugLog\(" lib/ \
             --include="*.dart" \
             | grep -v "safe_logger.dart" \
             | grep -v "debug_log.dart" \
             | grep -v "ad_log.dart" \
             | grep -v "ad_manager.dart" \
             | grep -v "ad_debug_log.dart" \
             | grep -v "background_service.dart" \
             | grep -v "server_cap.dart" \
             | grep -v "security_manager.dart" \
             | grep -v "firebase_bootstrap.dart" \
             | grep -v "ad_safety_service.dart"; then
            echo "❌ Raw print/agentDebugLog found. Use SafeLogger."
            exit 1
          fi

      - name: flutter analyze
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: flutter test
        run: flutter test --coverage --reporter expanded

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-log
          path: |
            build/test_results/
          if-no-files-found: ignore
