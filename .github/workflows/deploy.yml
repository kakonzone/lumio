name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-app-config:
    runs-on: ubuntu-latest
    env:
      APPWRITE_MAIN_ENDPOINT: ${{ secrets.APPWRITE_MAIN_ENDPOINT }}
      APPWRITE_MAIN_PROJECT_ID: ${{ secrets.APPWRITE_MAIN_PROJECT_ID }}
      APPWRITE_MAIN_API_KEY: ${{ secrets.APPWRITE_MAIN_API_KEY }}
      APPWRITE_MAIN_DATABASE_ID: ${{ secrets.APPWRITE_MAIN_DATABASE_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve SGP Lumio project
        run: |
          set -euo pipefail
          SGP_ENDPOINT="${APPWRITE_MAIN_ENDPOINT:-https://sgp.cloud.appwrite.io/v1}"
          SGP_PROJECT="${APPWRITE_MAIN_PROJECT_ID:-6a22869200230b1a8bf0}"
          SGP_DATABASE="${APPWRITE_MAIN_DATABASE_ID:-iptv_main}"
          SGP_API_KEY="${APPWRITE_MAIN_API_KEY:-${APPWRITE_API_KEY:-}}"
          {
            echo "MAIN_ENDPOINT=${SGP_ENDPOINT}"
            echo "MAIN_PROJECT=${SGP_PROJECT}"
            echo "MAIN_DATABASE=${SGP_DATABASE}"
            echo "MAIN_API_KEY=${SGP_API_KEY}"
          } >> "$GITHUB_ENV"
          echo "SGP Lumio endpoint: ${SGP_ENDPOINT}"
          echo "SGP Lumio project: ${SGP_PROJECT}"
          echo "SGP Lumio database: ${SGP_DATABASE}"

      - name: Verify Appwrite secrets
        run: |
          set -euo pipefail
          if [ -z "${MAIN_API_KEY}" ]; then
            echo "::error::Missing SGP Lumio API key"
            echo "Set APPWRITE_MAIN_API_KEY or APPWRITE_API_KEY (SGP Lumio project 6a22869200230b1a8bf0)"
            echo "Channels and featured_live_events are deployed from a separate NYC repo."
            exit 1
          fi
          echo "SGP Lumio API key OK (length: ${#MAIN_API_KEY})"

      - name: Update global_config updated_at in Appwrite (SGP)
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          PATCH_URL="${MAIN_ENDPOINT}/databases/${MAIN_DATABASE}/collections/app_config/documents/global_config"
          echo "Updating ${MAIN_DATABASE}/app_config/global_config updated_at=${TIMESTAMP}"
          echo "PATCH ${PATCH_URL}"

          HTTP_CODE=$(curl -sS -o /tmp/appwrite_patch.json -w "%{http_code}" -X PATCH \
            "${PATCH_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Appwrite-Project: ${MAIN_PROJECT}" \
            -H "X-Appwrite-Key: ${MAIN_API_KEY}" \
            -d "{\"data\":{\"updated_at\":\"${TIMESTAMP}\"}}")

          cat /tmp/appwrite_patch.json
          echo ""
          echo "HTTP ${HTTP_CODE}"

          BODY="$(cat /tmp/appwrite_patch.json)"
          case "${HTTP_CODE}" in
            200|201) echo "global_config updated_at OK" ;;
            401)
              if echo "${BODY}" | grep -q "not accessible in this region"; then
                echo "::error::Wrong SGP region for project ${MAIN_PROJECT}. Use https://sgp.cloud.appwrite.io/v1"
              else
                echo "::error::401 Unauthorized — use SGP Lumio API key for ${MAIN_PROJECT} with databases.write"
              fi
              exit 1
              ;;
            404)
              if echo "${BODY}" | grep -q "database_not_found"; then
                echo "::error::404 Database '${MAIN_DATABASE}' not found in SGP project ${MAIN_PROJECT}."
              elif echo "${BODY}" | grep -q "document_not_found"; then
                echo "::error::404 Document global_config missing — create in ${MAIN_DATABASE} → app_config"
              else
                echo "::error::404 Not Found — ${BODY}"
              fi
              exit 1
              ;;
            *) echo "::error::Appwrite PATCH failed (HTTP ${HTTP_CODE})"; exit 1 ;;
          esac

      - name: Sync Special Links to Appwrite (NYC catalog)
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_NYC_API_KEY }}
          APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
        run: |
          set -euo pipefail
          NYC_ENDPOINT="${APPWRITE_ENDPOINT:-https://nyc.cloud.appwrite.io/v1}"
          NYC_PROJECT="${APPWRITE_PROJECT_ID:-191876000995145}"
          NYC_DATABASE="${APPWRITE_DATABASE_ID:-iptv_main}"
          NYC_API_KEY="${APPWRITE_API_KEY:-}"
          if [ -z "${NYC_API_KEY}" ]; then
            echo "::warning::Skipping special_links sync — set APPWRITE_NYC_API_KEY (NYC project ${NYC_PROJECT})"
            exit 0
          fi
          export APPWRITE_ENDPOINT="${NYC_ENDPOINT}"
          export APPWRITE_PROJECT_ID="${NYC_PROJECT}"
          export APPWRITE_DATABASE_ID="${NYC_DATABASE}"
          export APPWRITE_API_KEY="${NYC_API_KEY}"
          echo "NYC catalog endpoint: ${NYC_ENDPOINT}"
          echo "NYC catalog project: ${NYC_PROJECT}"
          pip install requests
          python scripts/sync_special_links.py
