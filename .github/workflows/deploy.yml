name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-app-config:
    runs-on: ubuntu-latest
    env:
      APPWRITE_MAIN_ENDPOINT: ${{ secrets.APPWRITE_MAIN_ENDPOINT }}
      APPWRITE_MAIN_PROJECT_ID: ${{ secrets.APPWRITE_MAIN_PROJECT_ID }}
      APPWRITE_MAIN_API_KEY: ${{ secrets.APPWRITE_MAIN_API_KEY }}
      APPWRITE_MAIN_DATABASE_ID: ${{ secrets.APPWRITE_MAIN_DATABASE_ID }}
      APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
      APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
      APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
      APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Resolve Appwrite Lumio project
        run: |
          set -euo pipefail
          RESOLVED_ENDPOINT="${APPWRITE_MAIN_ENDPOINT:-${APPWRITE_ENDPOINT:-https://nyc.cloud.appwrite.io/v1}}"
          RESOLVED_PROJECT="${APPWRITE_MAIN_PROJECT_ID:-${APPWRITE_PROJECT_ID:-191876000995145}}"
          RESOLVED_DATABASE="${APPWRITE_MAIN_DATABASE_ID:-${APPWRITE_DATABASE_ID:-iptv_main}}"
          RESOLVED_API_KEY="${APPWRITE_MAIN_API_KEY:-${APPWRITE_API_KEY:-}}"
          {
            echo "MAIN_ENDPOINT=${RESOLVED_ENDPOINT}"
            echo "MAIN_PROJECT=${RESOLVED_PROJECT}"
            echo "MAIN_DATABASE=${RESOLVED_DATABASE}"
            echo "MAIN_API_KEY=${RESOLVED_API_KEY}"
          } >> "$GITHUB_ENV"
          echo "Lumio endpoint: ${RESOLVED_ENDPOINT}"
          echo "Lumio project: ${RESOLVED_PROJECT}"
          echo "Lumio database: ${RESOLVED_DATABASE}"

      - name: Verify Appwrite secrets
        run: |
          set -euo pipefail
          if [ -z "${MAIN_ENDPOINT}" ] || [ -z "${MAIN_PROJECT}" ] || [ -z "${MAIN_API_KEY}" ]; then
            echo "::error::Missing Lumio Appwrite GitHub Secrets"
            echo "Add at: Repo → Settings → Secrets and variables → Actions"
            echo "  APPWRITE_ENDPOINT     = https://nyc.cloud.appwrite.io/v1"
            echo "  APPWRITE_PROJECT_ID   = 191876000995145"
            echo "  APPWRITE_API_KEY      = Lumio project API key (databases.write)"
            echo "  APPWRITE_DATABASE_ID  = iptv_main (optional)"
            exit 1
          fi
          echo "Lumio Appwrite secrets OK (key length: ${#MAIN_API_KEY})"

      - name: Update global_config updated_at in Appwrite
        run: |
          set -euo pipefail
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          PATCH_URL="${MAIN_ENDPOINT}/databases/${MAIN_DATABASE}/collections/app_config/documents/global_config"
          echo "Updating ${MAIN_DATABASE}/app_config/global_config updated_at=${TIMESTAMP}"
          echo "PATCH ${PATCH_URL}"

          HTTP_CODE=$(curl -sS -o /tmp/appwrite_patch.json -w "%{http_code}" -X PATCH \
            "${PATCH_URL}" \
            -H "Content-Type: application/json" \
            -H "X-Appwrite-Project: ${MAIN_PROJECT}" \
            -H "X-Appwrite-Key: ${MAIN_API_KEY}" \
            -d "{\"data\":{\"updated_at\":\"${TIMESTAMP}\"}}")

          cat /tmp/appwrite_patch.json
          echo ""
          echo "HTTP ${HTTP_CODE}"

          BODY="$(cat /tmp/appwrite_patch.json)"
          case "${HTTP_CODE}" in
            200|201) echo "global_config updated_at OK" ;;
            401)
              if echo "${BODY}" | grep -q "not accessible in this region"; then
                echo "::error::Wrong Appwrite region for project ${MAIN_PROJECT}. Use the Lumio project endpoint from Appwrite Console."
              else
                echo "::error::401 Unauthorized — use Lumio project API key for ${MAIN_PROJECT} with databases.write scope"
              fi
              exit 1
              ;;
            404)
              if echo "${BODY}" | grep -q "database_not_found"; then
                echo "::error::404 Database '${MAIN_DATABASE}' not found in project ${MAIN_PROJECT}."
                echo "Check GitHub Secrets match Lumio Appwrite Console (project ${MAIN_PROJECT}, database ${MAIN_DATABASE})."
                echo "Expected database id: iptv_main"
              elif echo "${BODY}" | grep -q "document_not_found"; then
                echo "::error::404 Document global_config missing — create it in ${MAIN_DATABASE} → app_config"
              else
                echo "::error::404 Not Found — ${BODY}"
              fi
              exit 1
              ;;
            *) echo "::error::Appwrite PATCH failed (HTTP ${HTTP_CODE})"; exit 1 ;;
          esac

      - name: Sync Special Links to Appwrite
        env:
          APPWRITE_ENDPOINT: ${{ env.MAIN_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ env.MAIN_PROJECT }}
          APPWRITE_API_KEY: ${{ env.MAIN_API_KEY }}
          APPWRITE_DATABASE_ID: ${{ env.MAIN_DATABASE }}
        run: |
          set -euo pipefail
          pip install requests
          python scripts/sync_special_links.py
