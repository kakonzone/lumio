name: Build and Release APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.json'
      - 'web/version.json'
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      # - name: Decode keystore
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #   run: |
      #     echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      # - name: Create key.properties
      #   env:
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #   run: |
      #     cat > android/key.properties <<EOF
      #     storePassword=${KEYSTORE_PASSWORD}
      #     keyPassword=${KEY_PASSWORD}
      #     keyAlias=${KEY_ALIAS}
      #     storeFile=app/release.keystore
      #     EOF

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi

      - name: Build secrets.json (ci_defines + CI secrets)
        env:
          CRICBUZZ_RAPID_API_KEY: ${{ secrets.CRICBUZZ_RAPID_API_KEY }}
          LEVELPLAY_APP_KEY: ${{ secrets.LEVELPLAY_APP_KEY }}
          LEVELPLAY_INTERSTITIAL_AD_UNIT: ${{ secrets.LEVELPLAY_INTERSTITIAL_AD_UNIT }}
          LEVELPLAY_REWARDED_AD_UNIT: ${{ secrets.LEVELPLAY_REWARDED_AD_UNIT }}
          LEVELPLAY_BANNER_AD_UNIT: ${{ secrets.LEVELPLAY_BANNER_AD_UNIT }}
          ADSTERRA_DL_1: ${{ secrets.ADSTERRA_DL_1 }}
          ADSTERRA_DL_2: ${{ secrets.ADSTERRA_DL_2 }}
          ADSTERRA_DL_3: ${{ secrets.ADSTERRA_DL_3 }}
          ADSTERRA_DL_4: ${{ secrets.ADSTERRA_DL_4 }}
          ADSTERRA_DIRECT_LINK: ${{ secrets.ADSTERRA_DIRECT_LINK }}
          ADSTERRA_NATIVE_INVOKE_URL: ${{ secrets.ADSTERRA_NATIVE_INVOKE_URL }}
          ADSTERRA_NATIVE_BASE_URL: ${{ secrets.ADSTERRA_NATIVE_BASE_URL }}
          ADSTERRA_POPUNDER_SCRIPT_URL: ${{ secrets.ADSTERRA_POPUNDER_SCRIPT_URL }}
          ADSTERRA_POPUNDER_BASE_URL: ${{ secrets.ADSTERRA_POPUNDER_BASE_URL }}
          CAP_BASE_URL: ${{ secrets.CAP_BASE_URL }}
          CAP_HMAC_KEY: ${{ secrets.CAP_HMAC_KEY }}
          TOFFEE_SUBSCRIBER_TOKEN: ${{ secrets.TOFFEE_SUBSCRIBER_TOKEN }}
          STREAM_TOKEN_BASE_URL: ${{ secrets.STREAM_TOKEN_BASE_URL }}
          SSL_PIN_PRIMARY: ${{ secrets.SSL_PIN_PRIMARY }}
          SSL_PIN_BACKUP: ${{ secrets.SSL_PIN_BACKUP }}
        run: python3 scripts/merge_release_defines.py

      - name: Get dependencies
        run: flutter pub get

      - name: Patch Flutter plugin Kotlin versions
        run: bash scripts/patch_plugin_kotlin.sh

      - name: Sync Android network security config
        run: python3 tool/gen_network_security_config.py

      - name: Guard against dev defines
        run: |
          if grep -E "LUMIO_SIDELOAD_DEV|CAP_LOCAL_ONLY_MODE" .github/workflows/release.yml | grep -v "Guard against dev defines" | grep -v "Verify no dev defines in APK" | grep -v "grep -E" | grep -v 'grep -q' | grep -v "strings" | grep -v "echo \"::error::"; then
            echo "::error::Dev defines found in release workflow"
            exit 1
          fi
          echo "✓ No dev defines in release workflow"


      - name: Build APK
        run: |
          mkdir -p build/debug-info
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform=android-arm64 \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --tree-shake-icons \
            --dart-define-from-file=secrets.json

      - name: Verify no dev defines in APK
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if strings "$APK" | grep -q "LUMIO_SIDELOAD_DEV"; then
            echo "::error::Dev define LUMIO_SIDELOAD_DEV found in APK"
            exit 1
          fi
          echo "✓ No dev defines in APK"

      - name: Verify signed with release cert
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if ! command -v apksigner &> /dev/null; then
            echo "::warning::apksigner not found, skipping cert verification"
            exit 0
          fi
          apksigner verify --print-certs "$APK" | tee /tmp/certs.txt
          if grep -q "CN=Lumio" /tmp/certs.txt; then
            echo "✓ APK signed with Lumio release certificate"
          else
            echo "::warning::APK certificate verification inconclusive"
          fi

      - name: Check APK size
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          SIZE=$(du -m "$APK" | cut -f1)
          echo "APK size: ${SIZE} MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "WARNING: APK size exceeds 50MB, may fail Appwrite upload"
          fi

      - name: Check APK size
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          SIZE=$(du -m "$APK" | cut -f1)
          echo "APK size: ${SIZE} MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "WARNING: APK size exceeds 50MB, may fail Appwrite upload"
          fi

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish APK to Appwrite (Storage + app_version)
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_MAIN_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_MAIN_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_MAIN_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_BUCKET_ID: ${{ secrets.APPWRITE_BUCKET_ID }}
          APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
          APPWRITE_COLLECTION_ID: ${{ secrets.APPWRITE_COLLECTION_ID }}
          APPWRITE_VERSION_DOC_ID: ${{ secrets.APPWRITE_VERSION_DOC_ID }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          APK_PATH: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        run: |
          set -euo pipefail
          export APPWRITE_ENDPOINT="${APPWRITE_ENDPOINT:-${APPWRITE_MAIN_ENDPOINT:-https://cloud.appwrite.io/v1}}"
          export APPWRITE_PROJECT_ID="${APPWRITE_PROJECT_ID:-${APPWRITE_MAIN_PROJECT_ID:-6a22869200230b1a8bf0}}"
          export APPWRITE_API_KEY="${APPWRITE_API_KEY:-${APPWRITE_MAIN_API_KEY:-}}"
          export APPWRITE_BUCKET_ID="${APPWRITE_BUCKET_ID:-lumio.apk}"
          export APPWRITE_DATABASE_ID="${APPWRITE_DATABASE_ID:-iptv_main}"
          export APPWRITE_COLLECTION_ID="${APPWRITE_COLLECTION_ID:-app_version}"
          export APPWRITE_VERSION_DOC_ID="${APPWRITE_VERSION_DOC_ID:-6a24675100155949547f}"
          if [ -z "${APPWRITE_API_KEY}" ]; then
            echo "::warning::Skipping Appwrite APK publish — set APPWRITE_API_KEY (SGP)"
            exit 0
          fi
          pip install requests
          python3 publish_apk_to_appwrite.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish version.json (lumio.me)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/$REPO/releases/download/v$VERSION/app-arm64-v8a-release.apk"
          MANIFEST="{\"version\":\"$VERSION\",\"apk_url\":\"$APK_URL\"}"
          echo "$MANIFEST" > web/version.json
          echo "$MANIFEST" > version.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/version.json version.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: publish version.json v$VERSION for lumio.me [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
