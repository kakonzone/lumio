name: Build and Release APK

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.json'
      - 'web/version.json'
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=app/release.keystore
          EOF

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi

      - name: Build secrets.json (ci_defines + CI secrets)
        env:
          LEVELPLAY_APP_KEY: ${{ secrets.LEVELPLAY_APP_KEY }}
          LEVELPLAY_INTERSTITIAL_AD_UNIT: ${{ secrets.LEVELPLAY_INTERSTITIAL_AD_UNIT }}
          LEVELPLAY_REWARDED_AD_UNIT: ${{ secrets.LEVELPLAY_REWARDED_AD_UNIT }}
          LEVELPLAY_BANNER_AD_UNIT: ${{ secrets.LEVELPLAY_BANNER_AD_UNIT }}
          ADSTERRA_DIRECT_LINK: ${{ secrets.ADSTERRA_DIRECT_LINK }}
          ADSTERRA_NATIVE_INVOKE_URL: ${{ secrets.ADSTERRA_NATIVE_INVOKE_URL }}
          ADSTERRA_NATIVE_BASE_URL: ${{ secrets.ADSTERRA_NATIVE_BASE_URL }}
          ADSTERRA_POPUNDER_SCRIPT_URL: ${{ secrets.ADSTERRA_POPUNDER_SCRIPT_URL }}
          ADSTERRA_POPUNDER_BASE_URL: ${{ secrets.ADSTERRA_POPUNDER_BASE_URL }}
          CAP_BASE_URL: ${{ secrets.CAP_BASE_URL }}
          CAP_HMAC_KEY: ${{ secrets.CAP_HMAC_KEY }}
          TOFFEE_SUBSCRIBER_TOKEN: ${{ secrets.TOFFEE_SUBSCRIBER_TOKEN }}
          STREAM_TOKEN_BASE_URL: ${{ secrets.STREAM_TOKEN_BASE_URL }}
          SSL_PIN_PRIMARY: ${{ secrets.SSL_PIN_PRIMARY }}
          SSL_PIN_BACKUP: ${{ secrets.SSL_PIN_BACKUP }}
        run: python3 scripts/merge_release_defines.py

      - name: Get dependencies
        run: flutter pub get

      - name: Patch Flutter plugin Kotlin versions
        run: bash scripts/patch_plugin_kotlin.sh

      - name: Sync Android network security config
        run: python3 tool/gen_network_security_config.py

      - name: Build APK
        run: |
          mkdir -p build/debug-info
          flutter build apk \
            --release \
            --split-per-abi \
            --target-platform=android-arm64 \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --tree-shake-icons \
            --dart-define-from-file=secrets.json \
            --dart-define=LUMIO_SIDELOAD_DEV=true \
            --dart-define=CAP_LOCAL_ONLY_MODE=true

      - name: Check APK size
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          SIZE=$(du -m "$APK" | cut -f1)
          echo "APK size: ${SIZE} MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "WARNING: APK size exceeds 50MB, may fail Appwrite upload"
          fi

      - name: Flutter analyze (non-blocking)
        run: |
          flutter analyze --no-fatal-infos --no-fatal-warnings || echo "Flutter analyze had issues but continuing..."

      - name: Check APK size
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          SIZE=$(du -m "$APK" | cut -f1)
          echo "APK size: ${SIZE} MB"
          if [ "$SIZE" -gt 50 ]; then
            echo "WARNING: APK size exceeds 50MB, may fail Appwrite upload"
          fi

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update version document with GitHub Release URL
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_MAIN_ENDPOINT: ${{ secrets.APPWRITE_MAIN_ENDPOINT }}
          APPWRITE_MAIN_PROJECT_ID: ${{ secrets.APPWRITE_MAIN_PROJECT_ID }}
          APPWRITE_MAIN_API_KEY: ${{ secrets.APPWRITE_MAIN_API_KEY }}
          APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
          APPWRITE_COLLECTION_ID: ${{ secrets.APPWRITE_COLLECTION_ID }}
          APPWRITE_VERSION_DOC_ID: ${{ secrets.APPWRITE_VERSION_DOC_ID }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "::warning::Skipping Appwrite version update temporarily (400 error on document update)"
          echo "GitHub Release will be created successfully for APK distribution"
          exit 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          files: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish version.json (lumio.me)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          REPO="${{ github.repository }}"
          APK_URL="https://github.com/$REPO/releases/download/v$VERSION/app-arm64-v8a-release.apk"
          MANIFEST="{\"version\":\"$VERSION\",\"apk_url\":\"$APK_URL\"}"
          echo "$MANIFEST" > web/version.json
          echo "$MANIFEST" > version.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/version.json version.json
          git diff --staged --quiet && exit 0
          git commit -m "chore: publish version.json v$VERSION for lumio.me [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
