name: Release APK (manual)

on:
  workflow_dispatch:

jobs:
  build-signed-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Write key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=app/release.keystore
          EOF

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi

      - name: Build secrets.json from CI secrets
        env:
          LEVELPLAY_APP_KEY: ${{ secrets.LEVELPLAY_APP_KEY }}
          ADSTERRA_DIRECT_LINK: ${{ secrets.ADSTERRA_DIRECT_LINK }}
          ADSTERRA_NATIVE_INVOKE_URL: ${{ secrets.ADSTERRA_NATIVE_INVOKE_URL }}
          ADSTERRA_NATIVE_BASE_URL: ${{ secrets.ADSTERRA_NATIVE_BASE_URL }}
          CAP_BASE_URL: ${{ secrets.CAP_BASE_URL }}
          CAP_HMAC_KEY: ${{ secrets.CAP_HMAC_KEY }}
          TOFFEE_SUBSCRIBER_TOKEN: ${{ secrets.TOFFEE_SUBSCRIBER_TOKEN }}
          STREAM_TOKEN_BASE_URL: ${{ secrets.STREAM_TOKEN_BASE_URL }}
        run: |
          python3 - <<'PY'
          import json, os
          keys = [
            "LEVELPLAY_APP_KEY", "ADSTERRA_DIRECT_LINK",
            "ADSTERRA_NATIVE_INVOKE_URL", "ADSTERRA_NATIVE_BASE_URL",
            "CAP_BASE_URL", "CAP_HMAC_KEY", "TOFFEE_SUBSCRIBER_TOKEN",
          ]
          data = {
            "ADS_ENABLED": "true",
            "STREAM_TOKEN_BASE_URL": os.environ.get("STREAM_TOKEN_BASE_URL", ""),
            "CAP_LOCAL_ONLY_MODE": "true",
          }
          for k in keys:
            v = os.environ.get(k, "")
            if v:
              data[k] = v
          if not str(data.get("CAP_BASE_URL", "")).strip():
            data["CAP_LOCAL_ONLY_MODE"] = "true"
          with open("secrets.json", "w") as f:
            json.dump(data, f, indent=2)
          PY

      - run: flutter pub get

      - name: Build release APK
        env:
          STREAM_TOKEN_BASE_URL: ${{ secrets.STREAM_TOKEN_BASE_URL }}
          SSL_PIN_PRIMARY: ${{ secrets.SSL_PIN_PRIMARY }}
          SSL_PIN_BACKUP: ${{ secrets.SSL_PIN_BACKUP }}
          MONETAG_ZONE_INTERSTITIAL: ${{ secrets.MONETAG_ZONE_INTERSTITIAL }}
          MONETAG_ZONE_REWARDED: ${{ secrets.MONETAG_ZONE_REWARDED }}
          MONETAG_ZONE_BANNER: ${{ secrets.MONETAG_ZONE_BANNER }}
          MONETAG_ZONE_NATIVE: ${{ secrets.MONETAG_ZONE_NATIVE }}
        run: |
          flutter build apk --release \
            --dart-define-from-file=secrets.json \
            --dart-define=STREAM_TOKEN_BASE_URL="${STREAM_TOKEN_BASE_URL}" \
            --dart-define=SSL_PIN_PRIMARY="${SSL_PIN_PRIMARY}" \
            --dart-define=SSL_PIN_BACKUP="${SSL_PIN_BACKUP}" \
            --dart-define=MONETAG_ZONE_INTERSTITIAL="${MONETAG_ZONE_INTERSTITIAL}" \
            --dart-define=MONETAG_ZONE_REWARDED="${MONETAG_ZONE_REWARDED}" \
            --dart-define=MONETAG_ZONE_BANNER="${MONETAG_ZONE_BANNER}" \
            --dart-define=MONETAG_ZONE_NATIVE="${MONETAG_ZONE_NATIVE}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumio-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
