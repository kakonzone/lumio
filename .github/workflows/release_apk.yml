name: Release APK (manual)

on:
  workflow_dispatch:

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-signed-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      # - name: Decode keystore
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #   run: |
      #     echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      # - name: Write key.properties
      #   env:
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #   run: |
      #     cat > android/key.properties <<EOF
      #     storePassword=${KEYSTORE_PASSWORD}
      #     keyPassword=${KEY_PASSWORD}
      #     keyAlias=${KEY_ALIAS}
      #     storeFile=app/release.keystore
      #     EOF

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          fi

      - run: flutter pub get

      - name: Patch Flutter plugin Kotlin versions
        run: bash scripts/patch_plugin_kotlin.sh

      - name: Sync Android network security config
        run: python3 tool/gen_network_security_config.py

      - name: Guard against dev defines
        run: |
          if grep -E "\-\-dart-define=(LUMIO_SIDELOAD_DEV|CAP_LOCAL_ONLY_MODE)" .github/workflows/release_apk.yml | grep -v "Guard against dev defines"; then
            echo "::error::Dev defines found in release workflow"
            exit 1
          fi
          echo "✓ No dev defines in release workflow"

      - name: Build debug APK (no signing)
        timeout-minutes: 75
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true"
        run: |
          flutter build apk \
            --debug \
            --split-per-abi \
            --target-platform=android-arm64 \
            --dart-define-from-file=secrets.json

      - name: Report APK size
        run: |
          APK=build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          ls -lh "$APK"
          du -m "$APK" | awk '{print "APK size: " $1 " MB (target 25-38 MB arm64)"}'

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish APK to Appwrite (Storage + app_version)
        env:
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_MAIN_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_MAIN_PROJECT_ID: ${{ secrets.APPWRITE_PROJECT_ID }}
          APPWRITE_MAIN_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_BUCKET_ID: ${{ secrets.APPWRITE_BUCKET_ID }}
          APPWRITE_DATABASE_ID: ${{ secrets.APPWRITE_DATABASE_ID }}
          APPWRITE_COLLECTION_ID: ${{ secrets.APPWRITE_COLLECTION_ID }}
          APPWRITE_VERSION_DOC_ID: ${{ secrets.APPWRITE_VERSION_DOC_ID }}
          APP_VERSION: ${{ steps.version.outputs.version }}
          APK_PATH: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
        run: |
          pip3 install requests
          export APPWRITE_ENDPOINT="${APPWRITE_ENDPOINT:-https://cloud.appwrite.io/v1}"
          python3 publish_apk_to_appwrite.py

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumio-debug-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
