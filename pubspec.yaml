name: lumio_tv
description: Lumio TV - Live Streaming App
version: 1.1.1+3
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # HTTP & Networking
  dio: 5.9.2
  encrypt: 5.0.3
  crypto: 3.0.7
  connectivity_plus: 7.1.1
  battery_plus: 6.2.3

  # State Management
  provider: 6.1.5+1

  # Video Player (media_kit + Android-only native libs)
  audio_service: 0.18.18
  audio_session: 0.2.3
  media_kit: 1.2.6
  media_kit_video: 2.0.1
  media_kit_libs_android_video: 1.3.8
  screen_brightness: 2.1.8

  # Images & UI
  cached_network_image: 3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_svg: ^2.0.14
  shimmer: 3.0.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  phosphor_flutter: ^2.0.0
  pull_to_refresh: 2.0.0

  # Storage
  shared_preferences: 2.5.5
  path_provider: 2.1.5

  # Utilities
  url_launcher: 6.3.2
  floating: 6.0.0
  vibration: ^3.1.8
  confetti: 0.8.0
  audioplayers: ^6.0.0
  logging: ^1.2.0
  uuid: ^4.5.1

  workmanager: 0.9.0+3
  # Firebase dependencies - can be disabled via FIREBASE_ENABLED=false for size optimization
  firebase_messaging: 16.2.2
  firebase_core: 4.9.0
  firebase_analytics: 12.4.1
  firebase_remote_config: 6.5.1
  firebase_crashlytics: 5.2.2
  flutter_local_notifications: 21.0.0

  # Ads monetization (Unity Ads direct SDK)
  unity_ads_plugin: ^0.3.30
  webview_flutter: 4.13.1
  webview_flutter_android: 4.12.0
  # Pinned together: device_info_plus 13.x + package_info_plus 10.x share win32 5.x
  device_info_plus: 13.1.0
  package_info_plus: 10.1.0
  dart_appwrite: ^25.0.0
  
  # Dev server dependencies (also used in production for API routes)
  shelf: 1.4.2
  shelf_router: 1.1.4
  shelf_cors_headers: 0.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: 6.0.0
  flutter_launcher_icons: 0.14.4
  flutter_native_splash: 2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#0C0C0E"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0C0C0E"
  image: assets/images/lumio_sports_logo.webp
  android_12:
    image: assets/images/lumio_sports_logo.webp
    color: "#0C0C0E"
  android: true
  ios: true
  web: false

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/cricket_icon.webp
    - assets/images/football_icon.webp
    - assets/images/lumio_sports_logo.webp
    - assets/images/fifa_wc26_banner_1.webp
    - assets/images/fifa_wc26_banner_2.webp
    - assets/data/vpn_asn_catalog.json
    - assets/data/featured_live_events.json
    - assets/legal/privacy_policy_template.md
    - assets/legal/terms_template.md

  fonts:
    - family: Barlow
      fonts:
        - asset: assets/fonts/Barlow-Regular.ttf
        - asset: assets/fonts/Barlow-Bold.ttf
          weight: 700
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Bold.ttf
          weight: 700
