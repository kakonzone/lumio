name: lumio_tv
description: Lumio TV - Live Streaming App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # State Management
  provider: ^6.1.2

  # Video Player
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.5
  video_player: ^2.9.2
  screen_brightness: ^0.2.2+1

  # Images & UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  pull_to_refresh: ^2.0.0

  # Storage
  shared_preferences: ^2.2.3

  # Utilities
  url_launcher: ^6.3.0
  floating: ^6.0.0

  # Backend — Dart Shelf (used by bin/server.dart)
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_cors_headers: ^0.1.5
  workmanager: ^0.9.0+3
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#0C0C0E"
  adaptive_icon_foreground: assets/images/app_icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Barlow
      fonts:
        - asset: assets/fonts/Barlow-Regular.ttf
        - asset: assets/fonts/Barlow-Medium.ttf
          weight: 500
        - asset: assets/fonts/Barlow-Bold.ttf
          weight: 700
        - asset: assets/fonts/Barlow-ExtraBold.ttf
          weight: 800
    - family: BarlowCondensed
      fonts:
        - asset: assets/fonts/BarlowCondensed-Bold.ttf
          weight: 700
        - asset: assets/fonts/BarlowCondensed-ExtraBold.ttf
          weight: 800